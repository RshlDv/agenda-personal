<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Agenda Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</head>

<body class="bg-[#fbf9f4] text-[#202020] min-h-screen">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#f5f1ea] p-8 border-r border-[#eadecc] flex flex-col justify-between">
            <div>
                <div class="text-3xl font-bold text-[#d0532b] mb-10">Tu Agenda Personal</div>
                <nav class="space-y-2">
                    <a href="/"
                        class="flex items-center gap-3 px-4 py-3 hover:bg-[#eae3d5] rounded-xl font-medium text-sm transition-colors">
                        <i class="fa-solid fa-table-cells-large text-gray-600"></i>Dashboard
                    </a>
                    <a href="/calendario"
                        class="flex items-center gap-3 px-4 py-3 bg-[#eae3d5] rounded-xl font-medium text-sm">
                        <i class="fa-regular fa-calendar text-gray-600"></i>Calendario
                    </a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 p-12 max-w-7xl">
            <header class="mb-6">
                <h1 class="text-4xl font-bold tracking-tight mb-2">Calendario</h1>
                <p class="text-gray-500">Selecciona cualquier dia para agendar algo</p>
            </header>
            <div class="bg-white p-6 rounded-2xl border border-[#eadecc] shadow-sm">
                <div id="calendar"></div>
            </div>
        </main>
    </div>

    <div id="modalEvento" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full border border-[#eadecc] shadow-xl">
            <h2 class="text-2xl font-bold mb-4 text-[#202020]">Nuevo Evento</h2>
            <form action="/eventos" method="POST" class="space-y-4">
                <div>
                    <label for="modalTitulo" class="block text-xs font-semibold text-gray-500 mb-1">Título</label>
                    <input type="text" id="modalTitulo" name="titulo" required
                        class="w-full p-2.5 bg-gray-50 border border-[#eadecc] rounded-xl text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="modalFecha" class="block text-xs font-semibold text-gray-500 mb-1">Fecha</label>
                        <input type="date" id="modalFecha" name="fecha" required
                            class="w-full p-2.5 bg-gray-50 border border-[#eadecc] rounded-xl text-sm">
                    </div>
                    <div>
                        <label for="modalHora" class="block text-xs font-semibold text-gray-500 mb-1">Hora</label>
                        <input type="time" id="modalHora" name="hora" required
                            class="w-full p-2.5 bg-gray-50 border border-[#eadecc] rounded-xl text-sm">
                    </div>
                </div>
                <div>
                    <label for="modalCategoria" class="block text-xs font-semibold text-gray-500 mb-1">Categoría</label>
                    <select id="modalCategoria" name="categoriaId"
                        class="w-full p-2.5 bg-gray-50 border border-[#eadecc] rounded-xl text-sm">
                        <option value="">Sin Etiqueta</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="cerrarModal()"
                        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl text-sm font-medium">Cancelar</button>
                    <button type="submit" class=S"px-4 py-2 bg-[#d0532b] hover:bg-[#b04320] text-white rounded-xl
                        text-sm font-medium">Guardar Plan</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/calendario.js}"></script>
</body>

</html>
